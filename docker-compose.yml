services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: qbd
      POSTGRES_PASSWORD: qbd
      POSTGRES_DB: qbd
    ports:
      - "5433:5432"
    volumes:
      - qbd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qbd"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  qbd_pgdata:
